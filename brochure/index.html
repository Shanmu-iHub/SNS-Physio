<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brochure - SNS College of Physiotherapy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Component injected via components.js -->
    <app-header></app-header>

    <section class="pt-32 pb-16 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <div class="bg-white rounded-3xl p-8 md:p-12 shadow-xl border border-gray-100">
                <i class="fas fa-file-pdf text-8xl text-red-600 mb-8"></i>
                <h2 class="text-4xl font-bold mb-4">SNS College of Physiotherapy Prospectus</h2>
                <p class="text-xl text-gray-700 mb-8">
                    Read our comprehensive guide with complete information about our programs, facilities, admission process, and
                    fees structure.
                </p>

                <div class="flex flex-col sm:flex-row gap-4 justify-center mb-8">
                    <a href="#" onclick="handleBrochureDownload(event)" class="bg-red-600 hover:bg-red-700 text-white px-10 py-5 rounded-2xl font-bold text-xl transition transform hover:-translate-y-1 hover:shadow-lg inline-flex items-center justify-center">
                        <i class="fas fa-download mr-3"></i>
                        Download PDF Brochure
                    </a>
                </div>

                <script>
                function handleBrochureDownload(e) {
                    e.preventDefault();
                    window.open('/brochure-viewer/', '_blank');
                }
                </script>

                <p class="text-sm text-gray-600">
                    For printed copies, contact us at <a href="tel:+919003655855"
                        class="text-primary-600 hover:underline font-bold">+91 90036 55855</a>
                </p>
            </div>
        </div>
    </section>

    <app-footer></app-footer>
    <script src="/static/js/components.js"></script>
</body>
</html>
